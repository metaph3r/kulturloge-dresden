#cloud-config
autoinstall:
  version: 1
  source:
    id: ubuntu-desktop-minimal
  locale: de_DE.UTF-8
  keyboard:
    layout: de
  timezone: Europe/Berlin
  refresh-installer:
    update: true
  identity:
    hostname: kulturloge-dd-notebook
    username: kulturloge-dd
    realname: KulturLoge Dresden e.V.
    password: $6$JVb3Fp79BtF3gxmu$C662E6dM35buuXshvpJGvyarkV9KdQOtQIQL614PQHwKHqpr0f/K2A0rqc9D4XURaJSW63.0.p1InWiTJzfHG/
  user-data:
    users:
      - name: admin
        gecos: Administrator
        groups: adm, cdrom, sudo, dip, plugdev, users, lpadmin
        passwd: $6$lCHB52HbwGLi0J.0$lJHiUC7HHJm.DTlvCu.dMOUZOmu81FAByE9nb3E0Mxum8JA8I5eOx0aSQE3TiDODrPjFxpIUK0Ul.dRENq5ls1
  ssh:
    install-server: false  
  storage:
    layout:
      name: direct
  snaps:
    - name: libreoffice
  codecs:
    install: true
  drivers:
    install: true
  updates: all
  late-commands:
    - curtin in-target -- apt-get remove --autoremove -y gnome-initial-setup
    - curtin in-target -- sudo -u "kulturloge-dd" -- dbus-run-session -- gsettings set org.gnome.shell favorite-apps "['firefox_firefox.desktop', 'org.gnome.Nautilus.desktop', 'org.gnome.Calculator.desktop', 'libreoffice_writer.desktop', 'libreoffice_calc.desktop', 'libreoffice_impress.desktop']"
  shutdown: reboot
